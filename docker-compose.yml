# Docker Compose: WordPress 6.9 + MySQL + Caddy
# Quick WordPress stack with automatic HTTPS via Caddy
#
# ── Running v6.9 and v5.9 side-by-side ──────────────────────────────
#
# Each version lives on its own git branch with separate ports,
# network, and domain so the two stacks don't collide.
#
#   Branch wordpress-6.9 (v6.9)  Branch wordpress-5.9 (v5.9)
#   ────────────────────────────  ────────────────────────────
#   Ports: 80 / 443              Ports: 8080 / 8443
#   SFTP port: 2222              SFTP port: 2223
#   Domain: wptesterx.com        Domain: wptesterx59.com
#   Env file: .env.wp-6.9        Env file: .env.wp-5.9
#   Network: wp-wordpress-69     Network: wp-wordpress-59
#
# Step 1 — Start v6.9 first (uses standard HTTP/HTTPS ports):
#   git checkout wordpress-6.9
#   docker compose -p wp69 --env-file .env.wp-6.9 up -d
#
# Step 2 — Start v5.9 (uses alternate ports):
#   git checkout wordpress-5.9
#   docker compose -p wp59 --env-file .env.wp-5.9 up -d
#
# Step 3 — Add both domains to /etc/hosts (each on its own line):
#   127.0.0.1  wptesterx.com
#   127.0.0.1  wptesterx59.com
#
# Access:
#   v6.9 → https://wptesterx.com
#   v5.9 → https://wptesterx59.com:8443
#
# To tear down:
#   docker compose -p wp69 down
#   docker compose -p wp59 down
# ─────────────────────────────────────────────────────────────────────

services:
  # WordPress 6.9 — the CMS itself
  wordpress:
    image: wordpress:6.9
    restart: unless-stopped
    env_file:
      - .env.wp-6.9
    environment:
      WORDPRESS_DB_HOST: db
      WORDPRESS_DB_NAME: ${MYSQL_DATABASE}
      WORDPRESS_DB_USER: ${MYSQL_USER}
      WORDPRESS_DB_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./wordpress-69:/var/www/html
    networks:
      - wordpress
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MySQL — database backend
  db:
    image: mysql:8.4
    restart: unless-stopped
    env_file:
      - .env.wp-6.9
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - ./db_data-69:/var/lib/mysql
    networks:
      - wordpress
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Caddy — reverse proxy with automatic HTTPS
  caddy:
    image: caddy:2
    restart: unless-stopped
    env_file:
      - .env.wp-6.9
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - wordpress
    depends_on:
      wordpress:
        condition: service_healthy

  # SFTP — file access to wp-content (themes, plugins, uploads)
  sftp:
    image: atmoz/sftp
    restart: unless-stopped
    ports:
      - "2222:22"
    volumes:
      - ./wordpress-69/wp-content:/home/${SFTP_USER}/wp-content
    networks:
      - wordpress
    command: "${SFTP_USER}:${SFTP_PASSWORD}:33:33:wp-content"
    depends_on:
      wordpress:
        condition: service_healthy

networks:
  wordpress:
    name: wp-wordpress-69
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
